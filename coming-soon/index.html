  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 background: var(--c-bg); color: var(--c-text); overflow-x: hidden; cursor: none; }\n    a, button { cursor: none; text-decoration: none; }\n    ::selection { background: rgba(123,111,232,0.15); color: #0D0D0D; }\n    *:focus-visible { outline: 2px solid var(--c-iris); outline-offset: 3px; }\n\n    @keyframes irisShift {\n      0%   { background-position: 0% 50%; }\n      50%  { background-position: 100% 50%; }\n      100% { background-position: 0% 50%; }\n    }\n    @keyframes gradShift {\n      0%   { background-position: 0% 50%; }\n      50%  { background-position: 100% 50%; }\n      100% { background-position: 0% 50%; }\n    }\n\n    /* ── CURSOR ── */\n    #cur-dot, #cur-ring {\n      position: fixed; border-radius: 50%; pointer-events: none; z-index: 9999;\n      transform: translate(-50%, -50%); will-change: transform;\n    }\n    #cur-dot {\n      width: 8px; height: 8px; background: #F8F6F2;\n      transition: opacity 200ms, background 350ms;\n    }\n    #cur-ring {\n      width: 28px; height: 28px; border: 1.5px solid rgba(248,246,242,0.35);\n      transition: width 250ms ease, height 250ms ease, border-color 250ms ease;\n    }\n    body.ch #cur-dot  { opacity: 0; }\n    body.ch #cur-ring { width: 52px; height: 52px; border-color: var(--c-gold); }\n    body.cc #cur-ring { width: 20px; height: 20px; }\n    body.light-zone #cur-dot  { background: var(--c-text); }\n    body.light-zone #cur-ring { border-color: rgba(13,13,13,0.22); }\n    body.light-zone.ch #cur-ring { border-color: var(--c-gold); }\n\n    /* ══════════════════════════\n       NAVBAR\n    ══════════════════════════ */\n    #nav {\n      position: fixed; top: 0; left: 0; right: 0; height: 64px; z-index: 1000;\n      transition: height 400ms ease, background 400ms ease, border-color 400ms ease;\n      border-bottom: 1px solid transparent;\n    }\n    #nav.over-video {\n      background: transparent;\n      border-bottom-color: transparent;\n    }\n    #nav.scrolled {\n      height: 52px;\n      background: rgba(255,255,255,0.92);\n      backdrop-filter: blur(20px) saturate(180%);\n      border-bottom-color: var(--c-border);\n    }\n\n    .nav-inner {\n      max-width: 1200px; margin: 0 auto; height: 100%;\n      display: flex; align-items: center; justify-content: space-between;\n      padding: 0 48px;\n    }\n\n    .nav-logo {\n      font-size: 16px; font-weight: 600; letter-spacing: -0.01em;\n      color: #F8F6F2;\n      opacity: 0; transform: translateX(-12px);\n      transition: opacity 500ms ease-out 100ms, transform 500ms ease-out 100ms, color 400ms;\n    }\n    .nav-logo.in   { opacity: 1; transform: none; }\n    #nav.scrolled .nav-logo { color: var(--c-text); }\n\n    .nav-links { display: flex; gap: 36px; list-style: none; }\n    .nav-links li {\n      font-size: 14px;\n      color: rgba(248,246,242,0.38);\n      cursor: default; user-select: none; position: relative;\n      opacity: 0; transform: translateY(-6px);\n      transition: opacity 400ms ease-out, transform 400ms ease-out, color 400ms;\n    }\n    .nav-links li.in   { opacity: 1; transform: none; }\n    #nav.scrolled .nav-links li { color: rgba(44,42,39,0.35); }\n\n    .soon-badge {\n      position: absolute; top: -8px; right: -26px;\n      font-size: 8px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;\n      background: var(--grad-iris); -webkit-background-clip: text;\n      -webkit-text-fill-color: transparent; background-clip: text;\n      background-size: 200% 200%; animation: irisShift 4s ease infinite;\n    }\n\n    .nav-btn {\n      font-size: 13px; font-weight: 500;\n      color: #F8F6F2;\n      border: 1px solid rgba(248,246,242,0.28); padding: 9px 20px; border-radius: 100px;\n      background: none;\n      opacity: 0;\n      transition: opacity 400ms ease-out 500ms, color 400ms, border-color 400ms, background 200ms;\n    }\n    .nav-btn.in { opacity: 1; }\n    #nav.scrolled .nav-btn { color: var(--c-text); border-color: var(--c-border); }\n    .nav-btn:hover { background: rgba(248,246,242,0.1); }\n    #nav.scrolled .nav-btn:hover { background: var(--c-text); color: #FFFFFF; border-color: var(--c-text); }\n\n    /* ══════════════════════════\n       3-VIDEO SCROLL DRIVER\n       Total scroll: 500vh\n       - 0-33%:   video1 (saludo, 3s)\n       - 33-66%:  video2 (texto, 5s) \n       - 66-100%: video3 (salida, 3s)\n    ══════════════════════════ */\n    #scroll-driver { height: 500vh; }\n\n    #hero {\n      position: sticky; top: 0; width: 100%; height: 100vh; overflow: hidden;\n    }\n\n    /* Canvas Sequencer */\n    .hero-canvas {\n      position: absolute; inset: 0; width: 100%; height: 100%;\n      object-fit: cover; display: block;\n    }\n    .seq-loader {\n      position: absolute; inset: 0;\n      display: flex; flex-direction: column;\n      align-items: center; justify-content: center;\n      background: #080B12; z-index: 10;\n      transition: opacity 0.5s ease;\n    }\n    .seq-loader.hidden { opacity: 0; pointer-events: none; }\n    .seq-loader-bar {\n      width: 200px; height: 3px;\n      background: rgba(255,255,255,0.15);\n      border-radius: 2px; overflow: hidden;\n    }\n    .seq-loader-fill {\n      height: 100%; background: #fff; width: 0%;\n      transition: width 0.1s linear;\n    }\n    .seq-loader-text {\n      color: rgba(255,255,255,0.45); font-size: 0.72rem;\n      margin-top: 12px; letter-spacing: 0.1em;\n    }\n\n    .video-overlay {\n      position: absolute; inset: 0; z-index: 1;\n      background: linear-gradient(to bottom,\n        rgba(8, 11, 18, 0.58) 0%,\n        rgba(8, 11, 18, 0.28) 48%,\n        rgba(8, 11, 18, 0.72) 100%\n      );\n    }\n\n    #progress-bar {\n      position: absolute; top: 0; left: 0; height: 2px; width: 0%;\n      background: var(--grad-iris); background-size: 200% 100%;\n      animation: irisShift 4s ease infinite;\n      z-index: 30; transition: width 80ms linear;\n    }\n\n    /* ══════════════════════════\n       HERO CONTENT\n    ══════════════════════════ */\n    .hero-content {\n      position: absolute; inset: 0; z-index: 10;\n      display: flex; flex-direction: column;\n      justify-content: flex-end;\n      padding: 0 48px 80px;\n      /* Will translate up during stage 3 */\n      transform: translateY(0);\n      transition: transform 400ms ease, opacity 300ms ease;\n    }\n\n    .hero-top-label {\n      position: absolute; top: 96px; left: 48px;\n      font-size: 11px; font-weight: 400; text-transform: uppercase;\n      letter-spacing: 0.18em; color: rgba(248,246,242,0.45);\n      opacity: 0;\n      transition: opacity 500ms ease;\n    }\n    .hero-top-right {\n      position: absolute; top: 96px; right: 48px;\n      font-size: 11px; font-weight: 400; text-transform: uppercase;\n      letter-spacing: 0.18em; color: rgba(248,246,242,0.45); text-align: right;\n      opacity: 0;\n      transition: opacity 500ms ease;\n    }\n\n    /* Headline — fades in at end of stage 1, fades out during stage 3 */\n    .hero-headline {\n      font-size: clamp(60px, 10vw, 148px);\n      font-weight: 600; line-height: 0.95; letter-spacing: -0.04em;\n      color: #F8F6F2; max-width: 1100px;\n      text-transform: uppercase;\n      opacity: 0;\n      transform: translateY(40px);\n      transition: opacity 600ms ease, transform 600ms ease;\n    }\n    .hero-headline.visible {\n      opacity: 1;\n      transform: translateY(0);\n    }\n\n    .hero-headline .accent {\n      background: var(--grad-iris); -webkit-background-clip: text;\n      -webkit-text-fill-color: transparent; background-clip: text;\n      background-size: 200% 200%; animation: irisShift 6s ease infinite;\n    }\n\n    .hero-bottom {\n      display: flex; align-items: flex-end; justify-content: space-between;\n      margin-top: 48px; flex-wrap: wrap; gap: 32px;\n      opacity: 0;\n      transition: opacity 600ms ease;\n    }\n    .hero-bottom.visible { opacity: 1; }\n\n    .hero-sub {\n      font-size: 16px; font-weight: 400;\n      color: rgba(248,246,242,0.5); line-height: 1.65; max-width: 340px;\n    }\n\n    .notify-form {\n      display: flex; align-items: stretch;\n      border: 1px solid rgba(248,246,242,0.18); border-radius: 100px;\n      overflow: hidden; backdrop-filter: blur(8px);\n      background: rgba(248,246,242,0.07);\n      transition: border-color 250ms;\n    }\n    .notify-form:focus-within { border-color: rgba(123,111,232,0.5); }\n    .notify-input {\n      font-size: 14px; font-weight: 300; color: #F8F6F2;\n      background: transparent; border: none; outline: none;\n      padding: 13px 22px; width: 210px; letter-spacing: 0.01em;\n      font-family: 'Inter', sans-serif;\n    }\n    .notify-input::placeholder { color: rgba(248,246,242,0.28); }\n    .notify-btn {\n      font-size: 14px; font-weight: 500;\n      color: #FFFFFF;\n      background: linear-gradient(135deg, #7B6FE8, #C060C8, #E8507A, #6BBCE8);\n      background-size: 200% 200%; animation: gradShift 4s ease infinite;\n      border: none; padding: 13px 26px; cursor: none;\n      font-family: 'Inter', sans-serif;\n      transition: box-shadow 200ms, opacity 200ms; white-space: nowrap;\n    }\n    .notify-btn:hover { box-shadow: 0 0 24px rgba(123,111,232,0.45); animation-play-state: paused; }\n    .notify-btn.success { background: #4a9a6a; animation: none; }\n\n    .scroll-hint {\n      position: absolute; bottom: 40px; right: 48px; z-index: 10;\n      display: flex; flex-direction: column; align-items: center; gap: 10px;\n      opacity: 0;\n      transition: opacity 600ms ease;\n    }\n    .scroll-hint.visible { opacity: 1; }\n    .scroll-hint-label {\n      font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;\n      color: rgba(248,246,242,0.3); writing-mode: vertical-lr;\n    }\n    .scroll-hint-line {\n      width: 1px; height: 48px;\n      background: linear-gradient(to bottom, transparent, rgba(123,111,232,0.6));\n      animation: scrollPulse 2s ease-in-out infinite 2s;\n    }\n    @keyframes scrollPulse {\n      0%,100% { transform: scaleY(1); opacity: 0.6; }\n      50%      { transform: scaleY(1.25); opacity: 1; }\n    }\n\n    /* ══════════════════════════\n       BELOW HERO\n    ══════════════════════════ */\n    .marquee-section {\n      border-top: 1px solid var(--c-border); border-bottom: 1px solid var(--c-border);\n      padding: 14px 0; overflow: hidden; background: var(--c-bg);\n    }\n    .marquee-track {\n      display: flex; white-space: nowrap;\n      animation: mLeft 28s linear infinite;\n    }\n    .marquee-track:hover { animation-play-state: paused; }\n    .marquee-item {\n      font-size: 12px; font-weight: 500; text-transform: uppercase;\n      letter-spacing: 0.14em; color: var(--c-text-soft); padding: 0 32px;\n    }\n    .marquee-dot {\n      background: var(--grad-iris); -webkit-background-clip: text;\n      -webkit-text-fill-color: transparent; background-clip: text; font-size: 9px;\n    }\n    @keyframes mLeft { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }\n\n    .main-section {\n      padding: 160px 48px; background: var(--c-bg);\n    }\n    .main-inner {\n      max-width: 1200px; margin: 0 auto;\n      display: flex; align-items: flex-start; justify-content: space-between;\n      gap: 80px; flex-wrap: wrap;\n    }\n\n    .main-left { flex: 1; min-width: 300px; }\n    .section-eyebrow {\n      font-size: 11px; font-weight: 400; text-transform: uppercase;\n      letter-spacing: 0.18em; color: var(--c-text-soft); margin-bottom: 32px;\n    }\n    .main-headline {\n      font-size: clamp(48px, 7vw, 100px);\n      font-weight: 600; letter-spacing: -0.04em; line-height: 0.95;\n      color: var(--c-text);\n    }\n    .main-headline .muted { color: var(--c-text-soft); }\n    .main-headline .iris {\n      background: var(--grad-iris); -webkit-background-clip: text;\n      -webkit-text-fill-color: transparent; background-clip: text;\n      background-size: 200% 200%; animation: irisShift 6s ease infinite;\n    }\n\n    .main-right {\n      flex: 0 0 340p er-spacing: 0.14em; padding: 0 24px; }\n    .t-row-1 .t-item { color: rgba(248,246,242,0.6); }\n    .t-row-2 .t-item {\n      background: var(--grad-iris); background-size: 200% 100%;\n      -webkit-background-clip: text; -webkit-text-fill-color: transparent;\n      background-clip: text; animation: irisShift 6s ease infinite;\n    }\n    .t-sep { color: rgba(248,246,242,0.18); }\n\n    #footer {\n      background: #0A0C16; border-top: 1px solid #1A1D26;\n      padding: 64px 48px 40px;\n    }\n    .footer-grid { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 48px; }\n    .footer-top {\n      display: flex; align-items: flex-start; justify-content: space-between;\n      flex-wrap: wrap; gap: 32px;\n    }\n    .f-logo { font-size: 16px; font-weight: 600; color: #F8F6F2; }\n    .f-nav { display: flex; gap: 32px; list-style: none; flex-wrap: wrap; }\n    .f-nav li { font-size: 14px; color: #6B6866; user-select: none; }\n    .f-socials { display: flex; gap: 10px; }\n    .f-social {\n      width: 32px; height: 32px; border-radius: 50%;\n      border: 1px solid #1A1D26;\n      display: flex; align-items: center; justify-content: center;\n      transition: border-color 200ms;\n    }\n    .f-social:hover { border-color: var(--c-gold); }\n    .f-social svg { width: 13px; height: 13px; color: #6B6866; }\n    .footer-bottom {\n      display: flex; align-items: center; justify-content: space-between;\n      border-top: 1px solid #1A1D26; padding-top: 24px;\n      flex-wrap: wrap; gap: 16px;\n    }\n    .f-copy { font-size: 13px; color: #6B6866; }\n\n    .wa {\n      opacity: 0; transform: translateY(24px);\n      transition: opacity 700ms cubic-bezier(0.22,1,0.36,1), transform 700ms cubic-bezier(0.22,1,0.36,1);\n    }\n    .wa.in { opacity: 1; transform: none; }\n\n    /* ══════════════════════════\n       LOGIN MODAL\n    ══════════════════════════ */\n    .modal-backdrop {\n      position: fixed; inset: 0;\n      background: rgba(8,11,18,0.72);\ v>\n\n  <script>\n    /* ════════════════════════════════════\n       CURSOR\n    ════════════════════════════════════ */\n    const dot  = document.getElementById('cur-dot');\n    const ring = document.getElementById('cur-ring');\n    let mx = window.innerWidth/2, my = window.innerHeight/2;\n    let dx = mx, dy = my, rx = mx, ry = my;\n\n    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });\n    function lerp(a,b,t){ return a+(b-a)*t; }\n    (function loop(){\n      dx = lerp(dx,mx,0.15); dy = lerp(dy,my,0.15);\n      rx = lerp(rx,mx,0.07); ry = lerp(ry,my,0.07);\n      dot.style.left = dx+'px'; dot.style.top = dy+'px';\n      ring.style.left = rx+'px'; ring.style.top = ry+'px';\n      requestAnimationFrame(loop);\n    })();\n    document.querySelectorAll('a,button').forEach(el => {\n      el.addEventListener('mouseenter', () => document.body.classList.add('ch'));\n      el.addEventListener('mouseleave', () => document.body.classList.remove('ch'));\n    });\n    document.addEventListener('mousedown', () => {\n      document.body.classList.add('cc');\n      setTimeout(() => document.body.classList.remove('cc'), 180);\n    });\n\n    /* ════════════════════════════════════\n       3-VIDEO SCROLL ORCHESTRATION\n       Stage 1 (0-33%):   video1, text fades in at end\n       Stage 2 (33-66%):  video2, text stays, only video scrubs\n       Stage 3 (66-100%): video3, text fades out + hero moves up\n    ════════════════════════════════════ */\n    const driver      = document.getElementById('scroll-driver');\n    const progressBar = document.getElementById('progress-bar');\n    // ─── CANVAS SEQUENCER v2 (Lerp + Priority Load + DPR) ───────────\n    const heroCanvas    = document.getElementById('heroCanvas');\n    const seqLoader     = document.getElementById('seqLoader');\n    const seqLoaderFill = document.getElementById('seqLoaderFill');\n    const ctx           = heroCanvas.getContext('2d');\n\n    // ── CONFIG ──────────────────────────────────────────────────\n    const SEQ_CONFIG = {\n      seq1: { path: 'frames/seq1/f_', count: 73,  start: 0.00, end: 0.30 },\n      seq2: { path: 'frames/seq2/f_', count: 121, start: 0.30, end: 0.70 },\n      seq3: { path: 'frames/seq3/f_', count: 73,  start: 0.70, end: 1.00 },\n    };\n    const PADDING        = 3;\n    const LERP_FACTOR    = 0.15; // inercia: 0=estático, 1=instantáneo\n    const PRIORITY_BURST = 5;    // frames prioritarios por secuencia\n\n    // ── ESTADO ──────────────────────────────────────────────────\n    const seqState = {\n      sequences    : { seq1: [], seq2: [], seq3: [] },\n      loaded       : { seq1: 0,  seq2: 0,  seq3: 0  },\n      isVisible    : true,\n      lastFrame    : null,\n      rafId        : null,\n      lerpProgress : 0,\n    };\n    const totalFrames = SEQ_CONFIG.seq1.count + SEQ_CONFIG.seq2.count + SEQ_CONFIG.seq3.count;\n\n    // ── PRELOAD ──────────────────────────────────────────────────\n    function padIdx(i) { return String(i).padStart(PADDING, '0'); }\n\n    function preloadRange(key, from, to) {\n      const { path, count } = SEQ_CONFIG[key];\n      const imgs = seqState.sequences[key];\n      if (!imgs.length) imgs.length = count; // pre-allocar slots\n      const total = to - from + 1;\n      return new Promise(resolve => {\n        let done = 0;\n        for (let i = from; i <= to; i++) {\n          const img = new Image();\n          img.src = path + padIdx(i) + '.webp';\n          imgs[i - 1] = img;\n          img.onload = img.onerror = () => {\n            done++;\n            seqState.loaded[key]++;\n            onLoadProgress();\n            if (done === total) resolve();\n          };\n        }\n      });\n    }\n\n    function preloadSeq(key) {\n      return preloadRange(key, 1, SEQ_CONFIG[key].count);\n    }\n\n    // ── LOADER ──────────────────────────────────────────────────\n    function onLoadProgress() {\n      const loaded = seqState.loaded.seq1 + seqState.loaded.seq2 + seqState.loaded.seq3;\n      seqLoaderFill.style.width = Math.round((loaded / totalFrames) * 100) + '%';\n    }\n\n    // ── CANVAS RESIZE + devicePixelRatio ─────────────────────────\n    function resizeHeroCanvas() {\n      const dpr  = window.devicePixelRatio || 1;\n      const cssW = heroCanvas.offsetWidth  || window.innerWidth;\n      const cssH = heroCanvas.offsetHeight || window.innerHeight;\n      heroCanvas.width  = Math.round(cssW * dpr);\n      heroCanvas.height = Math.round(cssH * dpr);\n      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);\n    }\n    window.addEventListener('resize', resizeHeroCanvas);\n    resizeHeroCanvas();\n\n    // ── SCROLL → PROGRESO ────────────────────────────────────────\n    function getHeroScrollProgress() {\n      const maxScroll = driver.offsetHeight - window.innerHeight;\n      if (maxScroll <= 0) return 0;\n      return Math.max(0, Math.min(1, window.scrollY / maxScroll));\n    }\n\n    function getActiveFrame(progress) {\n      let key, localProgress;\n      if (progress <= SEQ_CONFIG.seq1.end) {\n        key = 'seq1';\n        localProgress = progress / SEQ_CONFIG.seq1.end;\n      } else if (progress <= SEQ_CONFIG.seq2.end) {\n        key = 'seq2';\n        localProgress = (progress - SEQ_CONFIG.seq1.end) / (SEQ_CONFIG.seq2.end - SEQ_CONFIG.seq1.end);\n      } else {\n        key = 'seq3';\n        localProgress = (progress - SEQ_CONFIG.seq2.end) / (SEQ_CONFIG.seq3.end - SEQ_CONFIG.seq2.end);\n      }\n      const seq   = seqState.sequences[key];\n      const index = Math.min((seq.length || 1) - 1, Math.floor(localProgress * (seq.length || 1)));\n      const frame = seq[index];\n      return (frame && frame.complete && frame.naturalWidth) ? frame : null;\n    }\n\n    // ── RENDER con cover-fit y DPR ───────────────────────────────\n    function drawFrameOnCanvas(img) {\n      if (!img || !img.complete || !img.naturalWidth) return;\n      const dpr   = window.devicePixelRatio || 1;\n      const cssW  = heroCanvas.width  / dpr;\n      const cssH  = heroCanvas.height / dpr;\n      const scale = Math.max(cssW / img.naturalWidth, cssH / img.naturalHeight);\n      const w = img.naturalWidth  * scale;\n      const h = img.naturalHeight * scale;\n      ctx.imageSmoothingEnabled = true;\n      ctx.imageSmoothingQuality = 'high';\n      ctx.clearRect(0, 0, cssW, cssH);\n      ctx.drawImage(img, (cssW - w) / 2, (cssH - h) / 2, w, h);\n    }\n\n    // ── RENDER LOOP con Lerp ──────────────────────────────────────\n    function canvasRenderLoop() {\n      if (!seqState.isVisible) return;\n      const target = getHeroScrollProgress();\n      seqState.lerpProgress += (target - seqState.lerpProgress) * LERP_FACTOR;\n      if (Math.abs(target - seqState.lerpProgress) < 0.0005) seqState.lerpProgress = target;\n      const frame = getActiveFrame(seqState.lerpProgress);\n      if (frame && frame !== seqState.lastFrame) {\n        drawFrameOnCanvas(frame);\n        seqState.lastFrame = frame;\n      }\n      seqState.rafId = requestAnimationFrame(canvasRenderLoop);\n    }\n\n    function startRenderLoop() {\n      if (seqState.rafId) cancelAnimationFrame(seqState.rafId);\n      seqState.rafId = requestAnimationFrame(canvasRenderLoop);\n    }\n\n    // ── INTERSECTION OBSERVER ────────────────────────────────────\n    new IntersectionObserver(entries => {\n      entries.forEach(e => {\n        seqState.isVisible = e.isIntersecting;\n        if (seqState.isVisible) { startRenderLoop(); }\n        else { cancelAnimationFrame(seqState.rafId); seqState.rafId = null; }\n      });\n    }, { threshold: 0 }).observe(heroCanvas);\n\n    // ── ANIMACIONES DE TEXTO ─────────────────────────────────────\n    function syncTextAnimations() {\n      const progress = getHeroScrollProgress();\n      const sp3 = progress * 3;\n      let stage, sp;\n      if (sp3 < 1)      { stage = 1; sp = sp3; }\n      else if (sp3 < 2) { stage = 2; sp = sp3 - 1; }\n      else              { stage = 3; sp = sp3 - 2; }\n\n      progressBar.style.width = (progress * 100) + '%';\n\n      if (stage === 1) {\n        const fp = sp > 0.8 ? (sp - 0.8) / 0.2 : 0;\n        heroHeadline.style.opacity = fp;\n        heroHeadline.style.transform = `translateY(${(1 - fp) * 40}px)`;\n        heroBottom.style.opacity = fp;\n        scrollHint.style.opacity = fp;\n        htl.style.opacity = fp;\n        htr.style.opacity = fp;\n        heroContent.style.transform = 'translateY(0)';\n      } else if (stage === 2) {\n        heroHeadline.style.opacity = 1;\n        heroHeadline.style.transform = 'translateY(0)';\n        heroBottom.style.opacity = 1;\n        scrollHint.style.opacity = 1;\n        htl.style.opacity = 1;\n        htr.style.opacity = 1;\n        heroContent.style.transform = 'translateY(0)';\n      } else {\n        const fp = 1 - sp;\n        heroHeadline.style.opacity = fp;\n        heroBottom.style.opacity   = fp;\n        scrollHint.style.opacity   = fp;\n        htl.style.opacity = fp;\n        htr.style.opacity = fp;\n        heroContent.style.transform = `translateY(${-sp * 80}px)`;\n      }\n    }\n\n    // ── INIT — Carga prioritaria por fases ───────────────────────\n    async function initCanvasSequencer() {\n      // Fase 1: 5 frames de seq1 → quitar loader de inmediato\n      await preloadRange('seq1', 1, PRIORITY_BURST);\n      seqLoader.classList.add('hidden');\n      startRenderLoop();\n      // Fase 2: resto de seq1 en background\n      preloadRange('seq1', PRIORITY_BURST + 1, SEQ_CONFIG.seq1.count);\n      // Fase 3: seq2 y seq3 en paralelo\n      preloadSeq('seq2');\n      preloadSeq('seq3');\n    }\n    initCanvasSequencer();\n\n    window.addEventListener('scroll', syncTextAnimations, { passive: true });\n\n    // Restore scroll\n    window.addEventListener('beforeunload', () => localStorage.setItem('koba_v3_scroll', window.scrollY));\n    const saved = parseInt(localStorage.getItem('koba_v3_scroll') || '0');\n    if(saved > 0) requestAnimationFrame(() => window.scrollTo(0, saved));\n\n    /* ════════════════════════════════════\n       NAVBAR STATE\n    ════════════════════════════════════ */\n    const nav = document.getElementById('nav');\n\n    function updateNav(){\n      const scrollY = window.scrollY;\n      const videoEnd = driver.offsetHeight - window.innerHeight;\n\n      if(scrollY < 60 && scrollY < videoEnd){\n        nav.classList.add('over-video');\n        nav.classList.remove('scrolled');\n        document.body.classList.remove('light-zone');\n      } else {\n        nav.classList.remove('over-video');\n        nav.classList.add('scrolled');\n        if(scrollY >= videoEnd){\n          document.body.classList.add('light-zone');\n        } else {\n          document.body.classList.remove('light-zone');\n        }\n      }\n    }\n    window.addEventListener('scroll', updateNav, { passive: true });\n\n    /* ════════════════════════════════════\n       NAV ENTRANCE\n    ════════════════════════════════════ */\n    function navIn(){\n      document.getElementById('nl').classList.add('in');\n      ['nl1','nl2','nl3','nl4'].forEach((id,i) =>\n        setTimeout(() => document.getElementById(id).classList.add('in'), 200 + i*80)\n      );\n      setTimeout(() => document.getElementById('loginBtn').classList.add('in'), 580);\n    }\n    if(document.readyState === 'complete') navIn(); else window.addEventListener('load', navIn);\n\n    /* ════════════════════════════════════\n       WA OBSERVER\n    ════════════════════════════════════ */\n    const io = new IntersectionObserver(entries => {\n      entries.forEach(entry => {\n        if(!entry.isIntersecting) return;\n        const delay = parseInt(entry.target.style.transitionDelay) || 0;\n        setTimeout(() => entry.target.classList.add('in'), delay);\n        io.unobserve(entry.target);\n      });\n    }, { threshold: 0.2 });\n    document.querySelectorAll('.wa').forEach(el => io.observe(el));\n\n    /* ════════════════════════════════════\n       NOTIFY FORM\n    ════════════════════════════════════ */\n    const notifyBtn   = document.getElementById('notifyBtn');\n    const notifyEmail = document.getElementById('notifyEmail');\n\n    notifyBtn.addEventListener('click', () => {\n      if(notifyEmail.value && notifyEmail.validity.valid){\n        notifyBtn.textContent = '¡Listo! ✓';\n        notifyBtn.classList.add('success');\n        notifyEmail.value = '';\n        setTimeout(() => { notifyBtn.textContent = 'Avísame'; notifyBtn.classList.remove('success'); }, 3500);\n      } else {\n        notifyEmail.focus();\n      }\n    });\n    notifyEmail.addEventListener('keydown', e => { if(e.key === 'Enter') notifyBtn.click(); });\n\n    /* ════════════════════════════════════\n       LOGIN MODAL\n    ════════════════════════════════════ */\n    const loginBtn   = document.getElementById('loginBtn');\n    const loginModal = document.getElementById('loginModal');\n    const modalClose = document.getElementById('modalClose');\n\n    loginBtn.addEventListener('click', () => loginModal.classList.add('open'));\n    modalClose.addEventListener('click', () => loginModal.classList.remove('open'));\n    loginModal.addEventListener('click', e => { if(e.target === loginModal) loginModal.classList.remove('open'); });\n    document.addEventListener('keydown', e => { if(e.key === 'Escape') loginModal.classList.remove('open'); });\n\n    function handleLogin(e){\n      e.preventDefault();\n      const btn = e.target.querySelector('.modal-submit');\n      btn.textContent = 'Entrando…'; btn.style.opacity = '0.7';\n      setTimeout(() => {\n        btn.textContent = 'Iniciar sesión'; btn.style.opacity = '';\n        loginModal.classList.remove('open');\n      }, 1800);\n    }\n  <\/script>\n\n\n\n<\/body><\/html>"
  </script>
