<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — KoBa Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/shared.css" />

  <style>
    /* ── DASHBOARD STYLES ── */
    .dashboard-container {
      max-width: 1200px; margin: 0 auto; padding: 120px 48px 80px;
    }
    .dashboard-header {
      margin-bottom: 60px;
    }
    .dashboard-title {
      font-size: clamp(36px, 6vw, 60px); font-weight: 600;
      letter-spacing: -0.02em; color: #0D0D0D; margin-bottom: 12px;
    }
    .dashboard-subtitle {
      font-size: 16px; color: #6B6866; max-width: 480px;
    }
    .dashboard-card {
      background: #FFFFFF; border: 1px solid #E8E4DF; border-radius: 12px;
      padding: 32px; margin-bottom: 32px;
    }
    .dashboard-card-title {
      font-size: 18px; font-weight: 600; color: #0D0D0D; margin-bottom: 16px;
    }
    .user-email-display {
      font-size: 16px; color: #6B6866; padding: 16px;
      background: #F8F6F2; border-radius: 8px; border-left: 3px solid #7B6FE8;
    }
    #purchases-list {
      list-style: none;
    }
    .purchase-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0; border-bottom: 1px solid #E8E4DF;
    }
    .purchase-item:last-child {
      border-bottom: none;
    }
    .purchase-info {
      flex: 1;
    }
    .purchase-name {
      font-size: 14px; font-weight: 500; color: #0D0D0D; margin-bottom: 4px;
    }
    .purchase-date {
      font-size: 12px; color: #A8A49F;
    }
    .purchase-amount {
      font-size: 14px; font-weight: 600; color: #7B6FE8;
    }
    #btn-logout {
      background: linear-gradient(135deg, #7B6FE8, #E8507A);
      color: #FFFFFF; font-family: 'Inter', sans-serif;
      font-size: 14px; font-weight: 500; padding: 12px 32px;
      border: none; border-radius: 8px; cursor: pointer;
      transition: transform 200ms, box-shadow 200ms;
    }
    #btn-logout:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(123, 111, 232, 0.3);
    }
    .empty-state {
      text-align: center; padding: 40px 20px; color: #A8A49F;
    }

    @media (max-width: 900px) {
      .dashboard-container { padding: 100px 24px 60px; }
      .dashboard-card { padding: 24px; }
      .purchase-item { flex-direction: column; align-items: flex-start; }
      .purchase-amount { margin-top: 8px; }
    }
  </style>
</head>
<body>
  <!-- CURSOR -->
  <div id="cur-dot"></div>
  <div id="cur-ring"></div>

  <!-- NAVBAR -->
  <nav id="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo" id="nl">KoBa Studio</a>
      <ul class="nav-links">
        <li><a href="/servicios.html" id="nl1">Servicios</a></li>
        <li><a href="/proceso.html" id="nl2">Proceso</a></li>
        <li><a href="/productos.html" id="nl3">Productos</a></li>
        <li><a href="/contacto.html" id="nl4">Contacto</a></li>
      </ul>
      <button id="btn-login" class="nav-btn" style="display:none">Iniciar sesión</button>
      <a href="/dashboard.html" id="btn-profile" class="nav-btn">Mi perfil</a>
      <button id="btn-logout" class="nav-btn">Cerrar sesión</button>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <div class="dashboard-container">
    <div class="dashboard-header">
      <h1 class="dashboard-title">Mi Perfil</h1>
      <p class="dashboard-subtitle">Bienvenido a tu área privada de KoBa Studio</p>
    </div>

    <!-- USER INFO -->
    <div class="dashboard-card">
      <h2 class="dashboard-card-title">Información de Usuario</h2>
      <div id="user-email" class="user-email-display">
        Cargando...
      </div>
    </div>

    <!-- PURCHASES -->
    <div class="dashboard-card">
      <h2 class="dashboard-card-title">Mis Compras</h2>
      <ul id="purchases-list">
        <li class="empty-state">Cargando tus compras...</li>
      </ul>
    </div>
  </div>

  <!-- CURSOR SCRIPT -->
  <script>
    const dot = document.getElementById('cur-dot');
    const ring = document.getElementById('cur-ring');
    window.addEventListener('mousemove', (e) => {
      dot.style.left = e.clientX + 'px';
      dot.style.top = e.clientY + 'px';
      ring.style.left = e.clientX + 'px';
      ring.style.top = e.clientY + 'px';
    });
    document.addEventListener('mouseenter', () => document.body.classList.remove('cc'));
    document.addEventListener('mouseleave', () => document.body.classList.add('cc'));
    const hoverEls = document.querySelectorAll('a, button, input, textarea');
    hoverEls.forEach(el => {
      el.addEventListener('mouseenter', () => document.body.classList.add('ch'));
      el.addEventListener('mouseleave', () => document.body.classList.remove('ch'));
    });

    /* NAVBAR SCROLL */
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => nav.classList.toggle('scrolled', scrollY > 80), { passive: true });

    function navIn() {
      setTimeout(() => document.getElementById('nl').classList.add('in'), 100);
      ['nl1', 'nl2', 'nl3', 'nl4'].forEach((id, i) =>
        setTimeout(() => document.getElementById(id).classList.add('in'), 250 + i * 100)
      );
      const btnProfile = document.getElementById('btn-profile');
      const btnLogout = document.getElementById('btn-logout');
      if (btnProfile) setTimeout(() => btnProfile.classList.add('in'), 650);
      if (btnLogout) setTimeout(() => btnLogout.classList.add('in'), 650);
    }
    document.readyState === 'complete' ? navIn() : window.addEventListener('load', navIn);
  </script>

  <!-- MODAL AUTH -->
  <div id="modal-auth" class="modal-overlay">
    <div class="modal-box">
      <button id="modal-close" class="modal-close-btn">&times;</button>
      <div class="modal-tabs">
        <button id="tab-login" class="modal-tab active">Entrar</button>
        <button id="tab-signup" class="modal-tab">Registrarse</button>
      </div>

      <form id="form-login" style="display:flex; flex-direction:column; gap:12px">
        <input id="login-email" type="email" placeholder="Email" required />
        <input id="login-password" type="password" placeholder="Contraseña" required />
        <p id="error-login" class="form-error"></p>
        <button type="submit" class="btn-modal-submit">Entrar</button>
        <div style="position:relative; text-align:center; margin:8px 0">
          <span style="background:#FFFFFF; padding:0 8px; position:relative; z-index:1; color:#A8A49F; font-size:12px">o</span>
          <div style="position:absolute; top:50%; left:0; right:0; height:1px; background:#E8E4DF; z-index:0"></div>
        </div>
        <button type="button" id="btn-google" style="display:flex; align-items:center; justify-content:center; gap:8px; background:#FFFFFF; color:#0D0D0D; border:1px solid #E8E4DF; padding:12px 16px; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer; transition:border-color 200ms, background 200ms">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v12M6 12h12"/></svg>
          Continuar con Google
        </button>
      </form>

      <form id="form-signup" style="display:none; flex-direction:column; gap:12px">
        <input id="signup-email" type="email" placeholder="Email" required />
        <input id="signup-password" type="password" placeholder="Contraseña (mínimo 6 caracteres)" required />
        <p id="error-signup" class="form-error"></p>
        <button type="submit" class="btn-modal-submit">Crear cuenta</button>
        <div style="position:relative; text-align:center; margin:8px 0">
          <span style="background:#FFFFFF; padding:0 8px; position:relative; z-index:1; color:#A8A49F; font-size:12px">o</span>
          <div style="position:absolute; top:50%; left:0; right:0; height:1px; background:#E8E4DF; z-index:0"></div>
        </div>
        <button type="button" id="btn-google" style="display:flex; align-items:center; justify-content:center; gap:8px; background:#FFFFFF; color:#0D0D0D; border:1px solid #E8E4DF; padding:12px 16px; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer; transition:border-color 200ms, background 200ms">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v12M6 12h12"/></svg>
          Continuar con Google
        </button>
      </form>
    </div>
  </div>

  <script type="module" src="/assets/js/main.js"></script>
  <script type="module" src="/assets/js/dashboard.js"></script>
</body>
</html>
