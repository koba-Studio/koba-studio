<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Perfil — KoBa Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/shared.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-family: 'Inter', sans-serif; }
    body { background: #F8F6F2; color: #0D0D0D; overflow-x: hidden; cursor: none; }
    a, button { cursor: none; text-decoration: none; }

    #cur-dot, #cur-ring {
      position: fixed; border-radius: 50%; pointer-events: none; z-index: 9999;
      transform: translate(-50%, -50%);
    }
    #cur-dot { width: 8px; height: 8px; background: #0D0D0D; transition: opacity 200ms, transform 200ms; }
    #cur-ring {
      width: 32px; height: 32px; border: 1.5px solid #0D0D0D;
      transition: width 300ms, height 300ms, border-color 300ms;
    }
    body.ch #cur-dot { opacity: 0; }
    body.ch #cur-ring { width: 52px; height: 52px; border-color: #C48B2F; }

    #nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(255,255,255,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid transparent; transition: border-color 300ms, background 300ms;
    }
    #nav.scrolled { border-bottom-color: #E8E4DF; }
    .nav-inner {
      display: flex; align-items: center; gap: 32px;
      padding: 0 48px; height: 64px; max-width: 1440px; margin: 0 auto;
    }
    .nav-logo {
      font-size: 15px; font-weight: 600; letter-spacing: -0.02em; color: #0D0D0D;
      opacity: 0; transform: translateY(-6px); transition: opacity 500ms, transform 500ms, color 200ms;
    }
    .nav-logo.in { opacity: 1; transform: none; }
    .nav-logo:hover { color: #C48B2F; }
    .nav-links { display: flex; gap: 36px; list-style: none; margin-right: auto; }
    .nav-links a {
      font-size: 13px; font-weight: 400; color: #6B6866; letter-spacing: 0.01em;
      opacity: 0; transform: translateY(-6px);
      transition: opacity 500ms, transform 500ms, color 200ms;
      position: relative;
    }
    .nav-links a.in { opacity: 1; transform: none; }
    .nav-links a:hover { color: #0D0D0D; }
    .nav-btn {
      font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
      color: #0D0D0D; background: transparent; border: 1px solid #E8E4DF;
      padding: 8px 20px; border-radius: 100px; letter-spacing: 0.01em;
      opacity: 0; transition: opacity 500ms, background 200ms, color 200ms, border-color 200ms;
    }
    .nav-btn.in { opacity: 1; }
    .nav-btn:hover { background: #0D0D0D; color: #FFFFFF; border-color: #0D0D0D; }

    .dash-wrap {
      max-width: 900px; margin: 0 auto;
      padding: 120px 48px 80px;
    }
    .dash-title {
      font-size: clamp(40px, 6vw, 72px); font-weight: 600;
      letter-spacing: -0.03em; color: #0D0D0D; margin-bottom: 8px; line-height: 1;
    }
    .dash-sub {
      font-size: 15px; color: #6B6866; margin-bottom: 64px;
    }
    .dash-card {
      background: #FFFFFF; border: 1px solid #E8E4DF; border-radius: 16px;
      padding: 32px; margin-bottom: 24px;
    }
    .dash-card-label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em;
      color: #A8A49F; margin-bottom: 16px;
    }
    .dash-email {
      font-size: 16px; color: #0D0D0D; font-weight: 500;
      padding: 16px; background: #F8F6F2; border-radius: 8px;
      border-left: 3px solid #7B6FE8;
    }
    .purchases-empty {
      text-align: center; padding: 48px 24px;
      color: #A8A49F; font-size: 14px; line-height: 1.8;
    }
    .purchase-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0; border-bottom: 1px solid #F0EDE8;
    }
    .purchase-row:last-child { border-bottom: none; }
    .purchase-name { font-size: 14px; font-weight: 500; color: #0D0D0D; }
    .purchase-date { font-size: 12px; color: #A8A49F; margin-top: 3px; }
    .purchase-badge {
      font-size: 11px; font-weight: 500; text-transform: uppercase;
      letter-spacing: 0.1em; padding: 4px 12px; border-radius: 100px;
      background: rgba(123,111,232,0.1); color: #7B6FE8;
    }
    .btn-logout-wrap { margin-top: 48px; }
    .btn-cerrar {
      font-family: 'Inter', sans-serif;
      font-size: 14px; font-weight: 500; letter-spacing: 0.02em;
      background: linear-gradient(135deg, #7B6FE8, #E8507A);
      color: #FFFFFF; border: none; border-radius: 100px;
      padding: 14px 36px; transition: transform 200ms, box-shadow 200ms;
    }
    .btn-cerrar:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(123,111,232,0.35); }

    @media (max-width: 768px) {
      .dash-wrap { padding: 100px 24px 60px; }
      .nav-inner { padding: 0 24px; }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>
  <div id="cur-dot"></div>
  <div id="cur-ring"></div>

  <nav id="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo" id="nl">KoBa Studio</a>
      <ul class="nav-links">
        <li><a href="/Servicios.html" id="nl1">Servicios</a></li>
        <li><a href="/Proceso.html" id="nl2">Proceso</a></li>
        <li><a href="/Productos.html" id="nl3">Productos</a></li>
        <li><a href="/Contacto.html" id="nl4">Contacto</a></li>
      </ul>
      <button id="btn-login" class="nav-btn" style="display:none">Iniciar sesión</button>
      <a href="/dashboard.html" id="btn-profile" class="nav-btn">Mi perfil</a>
      <button id="btn-logout" class="nav-btn">Cerrar sesión</button>
    </div>
  </nav>

  <div class="dash-wrap">
    <h1 class="dash-title">Mi Perfil</h1>
    <p class="dash-sub">Tu área privada en KoBa Studio</p>

    <div class="dash-card">
      <p class="dash-card-label">Cuenta</p>
      <div id="user-email" class="dash-email">Cargando...</div>
    </div>

    <div class="dash-card">
      <p class="dash-card-label">Mis productos</p>
      <div id="purchases-list">
        <div class="purchases-empty">Cargando tus productos...</div>
      </div>
    </div>

    <div class="btn-logout-wrap">
      <button id="btn-logout-main" class="btn-cerrar">Cerrar sesión</button>
    </div>
  </div>

  <script>
    const dot = document.getElementById('cur-dot');
    const ring = document.getElementById('cur-ring');
    window.addEventListener('mousemove', e => {
      dot.style.left = e.clientX + 'px'; dot.style.top = e.clientY + 'px';
      ring.style.left = e.clientX + 'px'; ring.style.top = e.clientY + 'px';
    });
    document.addEventListener('mouseenter', () => document.body.classList.remove('cc'));
    document.addEventListener('mouseleave', () => document.body.classList.add('cc'));
    document.querySelectorAll('a, button').forEach(el => {
      el.addEventListener('mouseenter', () => document.body.classList.add('ch'));
      el.addEventListener('mouseleave', () => document.body.classList.remove('ch'));
    });
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => nav.classList.toggle('scrolled', scrollY > 80), { passive: true });
    function navIn() {
      setTimeout(() => document.getElementById('nl').classList.add('in'), 100);
      ['nl1','nl2','nl3','nl4'].forEach((id,i) =>
        setTimeout(() => document.getElementById(id).classList.add('in'), 250 + i * 100)
      );
      const btnProfile = document.getElementById('btn-profile');
      const btnLogout = document.getElementById('btn-logout');
      if (btnProfile) setTimeout(() => btnProfile.classList.add('in'), 650);
      if (btnLogout) setTimeout(() => btnLogout.classList.add('in'), 650);
    }
    document.readyState === 'complete' ? navIn() : window.addEventListener('load', navIn);
  </script>

  <div id="modal-auth" class="modal-overlay">
    <div class="modal-box">
      <button id="modal-close" class="modal-close-btn">&times;</button>
      <div class="modal-tabs">
        <button id="tab-login" class="modal-tab active">Entrar</button>
        <button id="tab-signup" class="modal-tab">Registrarse</button>
      </div>
      <form id="form-login" style="display:flex; flex-direction:column; gap:12px">
        <input id="login-email" type="email" placeholder="Email" required />
        <input id="login-password" type="password" placeholder="Contraseña" required />
        <p id="error-login" class="form-error"></p>
        <button type="submit" class="btn-modal-submit">Entrar</button>
      </form>
      <form id="form-signup" style="display:none; flex-direction:column; gap:12px">
        <input id="signup-email" type="email" placeholder="Email" required />
        <input id="signup-password" type="password" placeholder="Contraseña (mínimo 6 caracteres)" required />
        <p id="error-signup" class="form-error"></p>
        <button type="submit" class="btn-modal-submit">Crear cuenta</button>
      </form>
    </div>
  </div>

  <script type="module" src="/assets/js/main.js"></script>
  <script type="module" src="/assets/js/dashboard.js"></script>
</body>
</html>
